<!doctype html>
<html>

<head>
    <title>Pinball
    </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="assets/pinball.css">
    <link rel="shortcut icon" type="image/png" href="assets/pinball.ico" />
    <meta property='og:title' content='Pinball'/>
    <meta property=' og:image' content='assets/linkedin-photo.png'/>
    <meta property='
        og:description' content='Beautiful, minimalist implementation of the classic arcade game Pinball'/>
    <meta property=' og:url' content='https://pinball.navaneet.me/' />
    <script type="module" src="main.js"></script>
</head>

<body>
    <div class="column"> 
        <div class="rows-a">Pinball</div>
        <div class="rows-a">Created By: <a href="https://www.linkedin.com/in/nramabad/" target="_blank">Navaneet Ramabadran</a></div>
        <div class="rows-a"><a href="https://www.linkedin.com/in/nramabad/" target="_blank"><img src='assets/linkedin.png' /></a></div>
        <div class="rows-a"><a href="https://www.github.com/nramabad/" target="_blank"><img src='assets/github.png' /></a></div>
    </div>
    <div class="column"><canvas width="700" height="500" id="game-canvas"></canvas></div>
    <div class="column">
        <div class="rows-b">Controls<br><br>
            <span id='controls'>&darr;: Launch Pinball<br>
            &larr;: Left Flipper<br>
            &rarr;: Right Flipper<br>
            space: Restart Game</span><br></div>
        <div class="rows-b">Score<br><br>
        <span class="score">
            High Score: <span id="high"></span><br>
            Your Score: <span id="test"></span><br><br></div>
        </span>
    </div>
    <img src="assets/balzano.png" id='balzano'/>
    <img src="assets/meditative.jpg" id='meditative' />
    <img src="assets/veil-art.jpg" id='veil-art' />
    <img src="assets/geom.jpg" id='geom' />
    <!-- <img src="assets/geometric.gif" id='ball' /> -->
    <div id="touch-bar">
        <button class="touch-btn" id="btn-left"
            ontouchstart="window.lPressed=true"
            ontouchend="window.lPressed=false"
            ontouchcancel="window.lPressed=false">&#8592;</button>
        <button class="touch-btn" id="btn-launch"
            ontouchstart="window.downPressed=true"
            ontouchend="window.downPressed=false"
            ontouchcancel="window.downPressed=false">&#8595;</button>
        <button class="touch-btn" id="btn-right"
            ontouchstart="window.rPressed=true"
            ontouchend="window.rPressed=false"
            ontouchcancel="window.rPressed=false">&#8594;</button>
        <button class="touch-btn" id="btn-restart"
            ontouchstart="window.sPressed=true;setTimeout(function(){window.sPressed=false},200)"
            ontouchend="window.sPressed=false">Reset</button>
    </div>
</body>

</html>
